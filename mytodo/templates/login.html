<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Todo App</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: #1e293b; margin-bottom: 25px; font-weight: 800; }
        form p { text-align: left; color: #64748b; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #6366f1; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        .link { margin-top: 20px; font-size: 0.9rem; color: #64748b; }
        .link a { color: #6366f1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Welcome Back! 👋</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <div class="link">
            New here? <a href="{% url 'signup' %}">Create an account</a>
        </div>
    </div>
</body>
</html>
