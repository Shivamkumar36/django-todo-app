<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - Todo App</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1e293b; margin-bottom: 25px; font-weight: 800; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { text-align: left; font-size: 0.9rem; color: #64748b; font-weight: 600; margin-bottom: -10px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }
        input:focus { border-color: #6366f1; }
        .update-btn {
            padding: 12px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .update-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .cancel-link {
            display: block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .cancel-link:hover { color: #ef4444; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Edit Task ✏️</h2>
        <form method="POST">
            {% csrf_token %}
            <label>Task Title</label>
            <input type="text" name="title" value="{{ task.title }}" required>
            
            <label>Due Date</label>
            <input type="date" name="due_date" value="{{ task.date_due|date:'Y-m-d' }}" required>
            
            <button type="submit" class="update-btn">Update Task</button>
        </form>
        <a href="{% url 'home' %}" class="cancel-link">Cancel & Go Back</a>
    </div>
</body>
</html>
