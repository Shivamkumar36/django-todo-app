<style>
    /* Modern CSS Design */
    :root {
        --primary: #6366f1;
        --secondary: #a855f7;
        --bg: #f8fafc;
        --text: #1e293b;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
    }

    .todo-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 450px;
        transition: transform 0.3s ease;
    }

    h2 {
        text-align: center;
        color: var(--text);
        font-size: 2rem;
        margin-bottom: 30px;
        font-weight: 800;
    }

    .user-info {
        text-align: right;
        font-size: 0.9rem;
        margin-bottom: 20px;
        color: #64748b;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
    }

    input[type="text"], input[type="date"] {
        padding: 12px 18px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        font-size: 1rem;
        transition: border-color 0.3s;
    }

    input:focus {
        border-color: var(--primary);
    }

    .add-btn {
        padding: 12px;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.3s;
    }

    .add-btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
    }

    ul { list-style: none; padding: 0; }

    li {
        background: white;
        margin-bottom: 12px;
        padding: 15px;
        border-radius: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .task-info { display: flex; flex-direction: column; }
    .task-title { font-weight: 600; color: var(--text); }
    .task-date { font-size: 0.8rem; color: #94a3b8; }
    
    .completed .task-title {
        text-decoration: line-through;
        color: #cbd5e1;
    }

    .actions { display: flex; gap: 10px; }
    
    .btn {
        text-decoration: none;
        font-size: 0.85rem;
        padding: 6px 12px;
        border-radius: 8px;
        font-weight: 600;
    }

    .done { background: #dcfce7; color: #166534; }
    .edit { background: #fef9c3; color: #854d0e; }
    .delete { background: #fee2e2; color: #991b1b; }

    .logout-btn {
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        font-weight: bold;
        text-decoration: underline;
    }
</style>

<div class="todo-container">
    <div class="user-info">
        Hi, <strong>{{ request.user.username }}</strong> | 
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <h2>My Tasks 📋</h2>
    
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="What needs to be done?" required>
        <input type="date" name="due_date" required>
        <button type="submit" class="add-btn">Add Task</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li class="{% if task.completed %}completed{% endif %}">
                <div class="task-info">
                    <span class="task-title">{{ task.title }}</span>
                    <span class="task-date">📅 Due: {{ task.date_due }}</span>
                </div>
                <div class="actions">
                    {% if not task.completed %}
                        <a href="{% url 'complete_task' task.id %}" class="btn done">Done</a>
                    {% endif %}
                    <a href="{% url 'edit_task' task.id %}" class="btn edit">Edit</a>
                    <a href="{% url 'delete_task' task.id %}" class="btn delete">Del</a>
                </div>
            </li>
        {% empty %}
            <p style="text-align: center; color: #64748b;">No tasks yet. Relax! ☕</p>
        {% endfor %}
    </ul>
</div>
