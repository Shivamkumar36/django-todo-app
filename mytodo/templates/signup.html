<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Todo App</title>
    <style>
        /* Login वाला ही CSS यहाँ भी काम करेगा */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: #1e293b; margin-bottom: 25px; font-weight: 800; }
        form p { text-align: left; color: #64748b; font-size: 0.8rem; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #a855f7, #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .link { margin-top: 20px; font-size: 0.9rem; color: #64748b; }
        .link a { color: #a855f7; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Join Us! ✨</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign Up</button>
        </form>
        <div class="link">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</body>
</html>
